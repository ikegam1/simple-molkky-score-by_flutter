name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Firebase Options File
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright Dependencies
        run: |
          cd e2e_tests
          npm install
          npx playwright install --with-deps chromium

      - name: Build Web for Test
        run: flutter build web --release --base-href "/simple-molkky-score-by_flutter/"

      - name: Run E2E Tests
        run: |
          cd e2e_tests
          # flutter run ではなく、ビルド済み成果物をサーブしてテスト実行
          npm run test

      - name: Deploy Web to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
